name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read

jobs:
  fixtures:
    name: fixtures
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Emitter fixtures
        run: python3 scripts/test/run_pytest.py scripts/unit_tests/meta/test_emitter.py -q

      - name: Core scripts parity fixtures
        run: python3 scripts/test/run_pytest.py scripts/unit_tests/meta/test_core_scripts_parity.py -q

      - name: Parity fixtures
        run: python3 scripts/test/run_pytest.py scripts/unit_tests/meta/test_parity.py -q

      - name: Claude golden fixtures
        run: python3 scripts/test/run_pytest.py scripts/unit_tests/meta/test_claude_golden.py -q

      - name: Gate fixtures
        run: python3 scripts/test/run_pytest.py scripts/unit_tests/meta/test_gate.py -q

  verify-full:
    name: verify-full
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Full scoped verify (pytest + pr-test-plan manifest)
        run: PYTHONPATH=scripts python3 scripts/test/_runner.py verify --scope full
