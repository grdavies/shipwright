name: CI

on:
  pull_request:

permissions:
  contents: read

jobs:
  fixtures:
    name: fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Emitter fixtures
        run: python3 scripts/test/run_emitter_fixtures.py

      - name: Core scripts parity fixtures
        run: python3 scripts/test/run_core_scripts_parity_fixtures.py

      - name: Parity fixtures
        run: python3 scripts/test/run_parity_fixtures.py

      - name: Claude golden fixtures
        run: python3 scripts/test/run_claude_golden_fixtures.py

      - name: Gate fixtures
        run: python3 scripts/test/run_gate_fixtures.py
