name: check-frozen

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frozen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check frozen artifacts
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bash scripts/check-frozen.sh "origin/${{ github.base_ref }}"
          else
            bash scripts/check-frozen.sh "HEAD~1"
          fi
